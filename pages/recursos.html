<!DOCTYPE html>
<html lang="es" data-aqua>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="theme-color" content="#f4f6fb"/>
  <meta name="color-scheme" content="light"/>
  <title>SGM · TRANSPOWER — Recursos</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/aqua/logo-aqua.svg"/>
  <script type="module" src="../assets/js/auth/page-guard.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../assets/css/aqua-tokens.css"/>
  <link rel="stylesheet" href="../assets/css/aqua-components.css"/>
  <link rel="stylesheet" href="../assets/css/inventario.css"/>
  <link rel="stylesheet" href="../assets/css/tabs.css"/>
</head>
<body class="aqua">
<main class="app-main page-container">

  <div class="page-header">
    <div class="breadcrumb">Recursos / Documentación</div>
    <h1 class="page-title">Recursos &amp; <em>Documentación</em></h1>
    <p class="page-subtitle">
      Biblioteca de documentos técnicos, normativas aplicables, cobertura
      geográfica del proyecto e información institucional.
    </p>
  </div>

  <div class="sgm-tabs" id="recursosTabs">
    <div role="tablist" class="tab-bar" aria-label="Secciones del módulo Recursos">
      <button type="button" role="tab" data-tab="documentos">
        <span class="i"><i data-lucide="folder-open"></i></span>Documentos
      </button>
      <button type="button" role="tab" data-tab="normativa">
        <span class="i"><i data-lucide="scroll-text"></i></span>Normativa
      </button>
      <button type="button" role="tab" data-tab="cobertura">
        <span class="i"><i data-lucide="globe-2"></i></span>Cobertura
      </button>
      <button type="button" role="tab" data-tab="about">
        <span class="i"><i data-lucide="info"></i></span>Acerca
      </button>
    </div>

    <div class="tab-panels">
      <div role="tabpanel" data-tab-panel="documentos">
        <iframe class="tab-iframe" data-src="documentos.html" title="Documentos" loading="lazy"></iframe>
      </div>
      <div role="tabpanel" data-tab-panel="normativa" hidden>
        <iframe class="tab-iframe" data-src="normativa.html" title="Normativa" loading="lazy"></iframe>
      </div>
      <div role="tabpanel" data-tab-panel="cobertura" hidden>
        <iframe class="tab-iframe" data-src="cobertura.html" title="Cobertura" loading="lazy"></iframe>
      </div>
      <div role="tabpanel" data-tab-panel="about" hidden>
        <iframe class="tab-iframe" data-src="about.html" title="Acerca" loading="lazy"></iframe>
      </div>
    </div>
  </div>

</main>

<script type="module" src="../assets/js/recursos-shell.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
<script src="../assets/js/aqua.js" defer></script>
<script src="../assets/js/aqua-shell.js" defer></script>
</body>
</html>
