<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#040c14"/>
  <meta name="color-scheme" content="dark"/>
  <meta name="robots" content="index, follow"/>
  <meta name="description" content="SGM · TRANSPOWER — Plataforma de gestión del mantenimiento especializado en transformadores de potencia. Acceso restringido al equipo."/>

  <title>SGM · TRANSPOWER — Acceso</title>

  <link rel="canonical" href="https://lordpowertransformersmj.github.io/"/>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg"/>

  <!-- Open Graph -->
  <meta property="og:type"        content="website"/>
  <meta property="og:site_name"   content="SGM · TRANSPOWER"/>
  <meta property="og:locale"      content="es_CO"/>
  <meta property="og:url"         content="https://lordpowertransformersmj.github.io/"/>
  <meta property="og:title"       content="SGM · TRANSPOWER — Plataforma de Mantenimiento"/>
  <meta property="og:description" content="Gestión del mantenimiento especializado en transformadores de potencia. Acceso restringido al equipo."/>
  <meta property="og:image"       content="https://lordpowertransformersmj.github.io/assets/img/favicon.svg"/>

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary"/>
  <meta name="twitter:title"       content="SGM · TRANSPOWER"/>
  <meta name="twitter:description" content="Plataforma de gestión del mantenimiento especializado en transformadores de potencia."/>
  <meta name="twitter:image"       content="https://lordpowertransformersmj.github.io/assets/img/favicon.svg"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/base.css"/>

  <style>
    /* ══════════════════════════════════════════════════════
       LOGIN PORTAL — SGM · TRANSPOWER (Fase 14)
       Layout centrado single-panel, estilo SaaS/operaciones.
    ══════════════════════════════════════════════════════ */

    .auth-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.4rem 2rem 2rem;
      box-shadow: 0 30px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(0,200,255,.08);
      animation: fadeUp .45s ease;
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: .8rem;
      margin-bottom: 1.4rem;
    }
    .auth-logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0,200,255,.22), transparent 60%),
                  radial-gradient(circle at 70% 70%, rgba(240,165,0,.18), transparent 60%);
      border: 1px solid var(--border);
      display: grid; place-items: center;
      box-shadow: var(--glow);
    }
    .auth-logo svg { width: 34px; height: 34px; }

    .auth-brand-text {
      font-family: var(--font-head);
      letter-spacing: .08em;
    }
    .auth-brand-text .brand-main {
      font-size: 1rem;
      color: var(--text);
      font-weight: 700;
    }
    .auth-brand-text .brand-main em {
      color: var(--accent);
      font-style: normal;
    }
    .auth-brand-text .brand-sub {
      font-family: var(--font-mono);
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .2em;
      margin-top: .2rem;
    }

    .auth-title {
      font-family: var(--font-head);
      font-weight: 600;
      font-size: 1.45rem;
      color: var(--text);
      margin-bottom: .3rem;
    }
    .auth-sub {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .15em;
      margin-bottom: 1.6rem;
    }

    .auth-field {
      display: block;
      margin-bottom: 1rem;
    }
    .auth-field label {
      display: block;
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .18em;
      margin-bottom: .35rem;
      text-transform: uppercase;
    }
    .auth-field input {
      width: 100%;
      background: #050d16;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: .95rem;
      padding: .75rem .9rem;
      border-radius: 3px;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .auth-field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,200,255,.18);
    }

    .auth-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: .72rem;
      margin-bottom: 1.4rem;
      gap: .5rem;
    }
    .auth-row label {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      color: var(--muted);
      letter-spacing: .08em;
      cursor: pointer;
      user-select: none;
    }
    .auth-row .link-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: .72rem;
      letter-spacing: .12em;
      cursor: pointer;
      padding: 0;
      text-transform: uppercase;
    }
    .auth-row .link-btn:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #041018;
      border: none;
      padding: .85rem 1rem;
      font-family: var(--font-head);
      font-weight: 700;
      letter-spacing: .18em;
      border-radius: 3px;
      cursor: pointer;
      font-size: .95rem;
      transition: filter .2s ease, box-shadow .2s ease, transform .1s ease;
      box-shadow: var(--glow);
    }
    .btn-submit:hover:not(:disabled) { filter: brightness(1.08); }
    .btn-submit:active:not(:disabled) { transform: translateY(1px); }
    .btn-submit:disabled {
      filter: grayscale(.6) brightness(.8);
      cursor: not-allowed;
      box-shadow: none;
    }

    .auth-msg {
      min-height: 1.2rem;
      margin-top: 1rem;
      font-family: var(--font-mono);
      font-size: .78rem;
      letter-spacing: .06em;
    }
    .auth-msg.err { color: #ff6680; }
    .auth-msg.ok  { color: var(--accent3); }
    .auth-msg.info { color: var(--muted); }

    .auth-foot {
      margin-top: 1.6rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: .64rem;
      letter-spacing: .12em;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }
    .auth-foot strong { color: var(--accent3); }
  </style>
</head>
<body>

<a class="skip-link" href="#main">Saltar al formulario de acceso</a>

<main id="main" class="auth-shell">

  <section class="auth-card" aria-labelledby="authTitle">

    <div class="auth-brand">
      <div class="auth-logo" aria-hidden="true">
        <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="44" cy="44" r="42" stroke="#0d2a3f" stroke-width="1.5"/>
          <circle cx="44" cy="44" r="42" stroke="url(#lg)" stroke-width="1.5" stroke-dasharray="4 6"/>
          <rect x="22" y="28" width="44" height="32" rx="2" fill="#070f1a" stroke="#0d2a3f" stroke-width="1"/>
          <rect x="28" y="34" width="14" height="20" rx="2" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
          <rect x="46" y="34" width="14" height="20" rx="2" fill="none" stroke="#f0a500" stroke-width="1.5"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#00c8ff"/>
              <stop offset="1" stop-color="#f0a500"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="auth-brand-text">
        <div class="brand-main">SGM · <em>TRANSPOWER</em></div>
        <div class="brand-sub">Gestión del Mantenimiento</div>
      </div>
    </div>

    <h1 id="authTitle" class="auth-title">Acceso a la plataforma</h1>
    <div class="auth-sub">// Ingrese sus credenciales de equipo</div>

    <form id="formLogin" novalidate>
      <div class="auth-field">
        <label for="fEmail">Correo corporativo</label>
        <input type="email" id="fEmail" name="email" autocomplete="email"
               required placeholder="nombre@empresa.com"/>
      </div>

      <div class="auth-field">
        <label for="fPass">Contraseña</label>
        <input type="password" id="fPass" name="password" autocomplete="current-password"
               required minlength="6" placeholder="••••••••"/>
      </div>

      <div class="auth-row">
        <label>
          <input type="checkbox" id="fRemember"/>
          Mantener sesión en este dispositivo
        </label>
        <button type="button" class="link-btn" id="btnReset">¿Olvidó su contraseña?</button>
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">INGRESAR →</button>

      <div class="auth-msg" id="authMsg" role="status" aria-live="polite"></div>
    </form>

    <div class="auth-foot">
      Acceso restringido al equipo de <strong>Dirección y Gestión del
      Mantenimiento en Transformadores de Potencia</strong> —
      Caribe Colombiano.
    </div>

  </section>

</main>

<script type="module">
  import {
    signInWithEmailAndPassword,
    sendPasswordResetEmail,
    setPersistence,
    browserLocalPersistence,
    browserSessionPersistence,
    onAuthStateChanged,
    signOut
  } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js';
  import {
    doc, getDoc
  } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

  import { getAuthSafe, getDbSafe, isFirebaseConfigured }
    from './assets/js/firebase-init.js';

  const $ = (id) => document.getElementById(id);
  const form     = $('formLogin');
  const email    = $('fEmail');
  const pass     = $('fPass');
  const remember = $('fRemember');
  const btn      = $('btnSubmit');
  const btnReset = $('btnReset');
  const msg      = $('authMsg');

  const AUTH_ERRORS = {
    'auth/invalid-email':            'Correo inválido.',
    'auth/user-disabled':            'Cuenta deshabilitada.',
    'auth/user-not-found':           'Credenciales incorrectas.',
    'auth/wrong-password':           'Credenciales incorrectas.',
    'auth/invalid-credential':       'Credenciales incorrectas.',
    'auth/too-many-requests':        'Demasiados intentos. Espere unos minutos.',
    'auth/network-request-failed':   'Sin conexión con el servidor de autenticación.',
    'auth/operation-not-allowed':    'Email/Password no habilitado en el proyecto Firebase.',
    'auth/missing-email':            'Correo requerido.',
    'auth/missing-password':         'Contraseña requerida.'
  };
  const humanize = (err) =>
    AUTH_ERRORS[err?.code] || err?.message || 'Error desconocido.';

  function setMsg(text, cls = 'info') {
    msg.textContent = text;
    msg.className = 'auth-msg ' + cls;
  }

  // Aviso si Firebase no está configurado.
  if (!isFirebaseConfigured) {
    setMsg('Firebase aún no configurado. Edite assets/js/firebase-config.js.', 'err');
    btn.disabled = true;
    btnReset.disabled = true;
  }

  // Si ya hay sesión válida, saltar directo al home.
  (function bootstrap() {
    const auth = getAuthSafe();
    const db   = getDbSafe();
    if (!auth || !db) return;
    const params = new URLSearchParams(location.search);
    if (params.get('denied')) {
      setMsg(params.get('denied') === 'admin'
        ? 'Su rol no permite acceder a ese recurso.'
        : 'Su cuenta no tiene acceso a la plataforma.', 'err');
    }
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      // Verificar perfil antes de redirigir.
      try {
        const snap = await getDoc(doc(db, 'usuarios', user.uid));
        if (snap.exists() && snap.data().activo !== false) {
          location.replace('home.html');
          return;
        }
        // Fallback legacy: admins colección
        const adminSnap = await getDoc(doc(db, 'admins', user.uid));
        if (adminSnap.exists()) {
          location.replace('home.html');
          return;
        }
      } catch (_) {}
      // Perfil inválido → cerrar sesión silenciosamente.
      try { await signOut(auth); } catch (_) {}
    });
  })();

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    setMsg('⋯ Verificando credenciales…', 'info');
    btn.disabled = true;

    const auth = getAuthSafe();
    const db   = getDbSafe();
    if (!auth || !db) {
      setMsg('Firebase no inicializado.', 'err');
      btn.disabled = false;
      return;
    }

    try {
      await setPersistence(
        auth,
        remember.checked ? browserLocalPersistence : browserSessionPersistence
      );
      const cred = await signInWithEmailAndPassword(
        auth, email.value.trim(), pass.value
      );

      // Verificar perfil activo en /usuarios/{uid} (o admin legacy).
      let ok = false;
      try {
        const snap = await getDoc(doc(db, 'usuarios', cred.user.uid));
        if (snap.exists() && snap.data().activo !== false) ok = true;
      } catch (_) {}
      if (!ok) {
        try {
          const legacy = await getDoc(doc(db, 'admins', cred.user.uid));
          if (legacy.exists()) ok = true;
        } catch (_) {}
      }

      if (!ok) {
        try { await signOut(auth); } catch (_) {}
        setMsg('Su cuenta no tiene perfil activo en la plataforma. Contacte al administrador.', 'err');
        btn.disabled = false;
        return;
      }

      setMsg('✓ Acceso concedido. Redirigiendo…', 'ok');
      setTimeout(() => location.replace('home.html'), 400);
    } catch (err) {
      setMsg(humanize(err), 'err');
      btn.disabled = false;
    }
  });

  btnReset.addEventListener('click', async () => {
    const addr = email.value.trim();
    if (!addr) {
      setMsg('Ingrese su correo antes de solicitar recuperación.', 'err');
      email.focus();
      return;
    }
    const auth = getAuthSafe();
    if (!auth) { setMsg('Firebase no inicializado.', 'err'); return; }
    setMsg('⋯ Enviando correo de recuperación…', 'info');
    try {
      await sendPasswordResetEmail(auth, addr);
      setMsg('Se envió un enlace de recuperación a ' + addr + '.', 'ok');
    } catch (err) {
      setMsg(humanize(err), 'err');
    }
  });
</script>

</body>
</html>
