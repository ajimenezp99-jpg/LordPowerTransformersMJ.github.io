<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>SGM · TRANSPOWER — Acceso Administrativo</title>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css"/>
  <link rel="stylesheet" href="../assets/css/app.css"/>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.25rem;
    }
    .login-card {
      width: 100%; max-width: 440px;
      background: linear-gradient(135deg, rgba(7,15,26,.95) 60%, rgba(0,30,50,.8));
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent2);
      border-radius: 4px;
      padding: 2rem 1.8rem;
      box-shadow: 0 0 60px rgba(240,165,0,.06), 0 2px 40px rgba(0,0,0,.6);
    }
    .login-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(240,165,0,.1);
      border: 1px solid rgba(240,165,0,.35);
      border-radius: 3px;
      padding: .3rem .8rem;
      font-family: var(--font-mono);
      font-size: .7rem; color: var(--accent2);
      letter-spacing: .15em; margin-bottom: 1.2rem;
    }
    .login-title {
      font-family: var(--font-head);
      font-weight: 700; font-size: 1.5rem;
      color: #e8f4fb; margin-bottom: .4rem;
      letter-spacing: .04em;
    }
    .login-title em { font-style: normal; color: var(--accent2); text-shadow: var(--glow2); }
    .login-sub {
      font-size: .85rem; color: var(--muted);
      line-height: 1.6; margin-bottom: 1.8rem;
    }
    .msg {
      min-height: 1.2rem;
      margin-top: .7rem;
      font-family: var(--font-mono);
      font-size: .76rem; letter-spacing: .05em;
    }
    .msg.ok  { color: var(--accent3); }
    .msg.err { color: #ff5577; }
    .warn-box {
      background: rgba(255,90,90,.07);
      border: 1px solid rgba(255,90,90,.3);
      border-left: 3px solid #ff5577;
      border-radius: 3px;
      padding: .8rem 1rem;
      margin-bottom: 1.2rem;
      font-size: .82rem; color: #ffbaba; line-height: 1.6;
    }
    .login-foot {
      margin-top: 1.4rem;
      text-align: center;
      font-family: var(--font-mono);
      font-size: .7rem; color: var(--muted);
      letter-spacing: .1em;
    }
    .login-foot a { color: var(--accent); text-decoration: none; }
    .login-foot a:hover { text-shadow: var(--glow); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-badge">
      <span style="width:7px;height:7px;border-radius:50%;background:var(--accent2)"></span>
      ZONA ADMINISTRATIVA · RESTRINGIDA
    </div>

    <h1 class="login-title">Acceso <em>Administrativo</em></h1>
    <p class="login-sub">
      Autenticación con Firebase. El acceso queda restringido a UIDs en la
      allowlist del sistema. Las sesiones se cierran al salir del navegador.
    </p>

    <div id="warnConfig" class="warn-box" style="display:none"></div>

    <form id="loginForm" autocomplete="off" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Correo administrativo</label>
        <input class="form-input" type="email" id="email" name="email"
               required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-input" type="password" id="password" name="password"
               required autocomplete="current-password">
      </div>

      <button type="submit" id="btnLogin" class="btn-primary" style="width:100%">
        INGRESAR AL PANEL →
      </button>
      <div id="msg" class="msg" role="status" aria-live="polite"></div>
    </form>

    <div class="login-foot">
      <a href="../home.html">← Volver a la zona interna</a>
    </div>
  </div>
</div>

<script type="module">
  import { loginAdmin, humanizeAuthError, ensureReady, ADMIN_ROUTES }
    from '../assets/js/admin/admin-auth.js';

  // Gate estático: si el usuario no pasó por index.html, forzarlo.
  try {
    if (sessionStorage.getItem('sgm.access') !== '1') {
      location.replace('../index.html');
    }
  } catch (_) {
    location.replace('../index.html');
  }

  const form    = document.getElementById('loginForm');
  const emailEl = document.getElementById('email');
  const passEl  = document.getElementById('password');
  const btn     = document.getElementById('btnLogin');
  const msg     = document.getElementById('msg');
  const warn    = document.getElementById('warnConfig');

  // Chequeo de prerequisitos (Firebase configurado + allowlist poblada)
  const ready = ensureReady();
  if (!ready.ok) {
    warn.style.display = 'block';
    warn.textContent = '⚠ ' + ready.reason;
    btn.disabled = true;
    btn.style.opacity = '.5';
    btn.style.cursor = 'not-allowed';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'msg';
    msg.textContent = '';
    btn.disabled = true;
    const originalTxt = btn.textContent;
    btn.textContent = 'VERIFICANDO…';

    try {
      await loginAdmin(emailEl.value.trim(), passEl.value);
      msg.className = 'msg ok';
      msg.textContent = '✓ Acceso concedido. Redirigiendo…';
      setTimeout(() => { location.replace(ADMIN_ROUTES.home); }, 400);
    } catch (err) {
      msg.className = 'msg err';
      msg.textContent = '✗ ' + humanizeAuthError(err);
      btn.disabled = false;
      btn.textContent = originalTxt;
    }
  });
</script>

</body>
</html>
