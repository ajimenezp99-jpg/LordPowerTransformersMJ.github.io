<svg viewBox="0 0 1920 900" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMax meet">
  <defs>
    <linearGradient id="towerSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#4a6590" stop-opacity="1"/>
      <stop offset="50%" stop-color="#7a92b8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3e5378" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="towerEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a68" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#1a2438" stop-opacity=".95"/>
    </linearGradient>
    <linearGradient id="trafoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5a6a85"/>
      <stop offset="35%"  stop-color="#2e3a52"/>
      <stop offset="100%" stop-color="#0f1827"/>
    </linearGradient>
    <linearGradient id="trafoTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6f80a0"/>
      <stop offset="100%" stop-color="#384866"/>
    </linearGradient>
    <linearGradient id="bushing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9e3f2"/>
      <stop offset="50%" stop-color="#9aaecb"/>
      <stop offset="100%" stop-color="#5a6e8e"/>
    </linearGradient>
    <linearGradient id="cableGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#007aff" stop-opacity=".8"/>
      <stop offset="50%" stop-color="#00b8d4" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#30d1b0" stop-opacity=".5"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(0,40,90,0)" stop-opacity="0"/>
      <stop offset="100%" stop-color="rgba(0,40,90,0.18)"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(0,184,212,.32)"/>
      <stop offset="100%" stop-color="rgba(0,184,212,0)"/>
    </radialGradient>
    <filter id="cableBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope=".40"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Halo ambient detrás del transformador -->
  <ellipse cx="1380" cy="640" rx="380" ry="180" fill="url(#halo)"/>

  <!-- Suelo difuminado -->
  <rect x="0" y="780" width="1920" height="120" fill="url(#ground)"/>
  <line x1="0" y1="785" x2="1920" y2="785" stroke="rgba(0,40,90,.18)" stroke-width="1.2"/>

  <!-- ════════════ TORRE DE ALTA TENSIÓN (lado izquierdo) ═══════════ -->
  <g filter="url(#softShadow)" transform="translate(360 0)">
    <!-- Pies / patas en X cruzada -->
    <polygon points="80,790 200,790 175,720 105,720" fill="url(#towerEdge)"/>
    <polygon points="200,790 320,790 295,720 225,720" fill="url(#towerEdge)" opacity=".75"/>

    <!-- Tronco principal (perspectiva trapecio) -->
    <polygon points="120,720 280,720 245,500 155,500" fill="url(#towerSteel)" stroke="#1c2540" stroke-width="1"/>
    <polygon points="155,500 245,500 220,310 180,310" fill="url(#towerSteel)" stroke="#1c2540" stroke-width="1"/>
    <polygon points="180,310 220,310 207,160 193,160" fill="url(#towerSteel)" stroke="#1c2540" stroke-width="1.2"/>

    <!-- Celosía / arriostres en X -->
    <g stroke="#1f2c46" stroke-width="1.4" fill="none" opacity=".85">
      <line x1="120" y1="720" x2="280" y2="500"/>
      <line x1="280" y1="720" x2="120" y2="500"/>
      <line x1="155" y1="500" x2="245" y2="310"/>
      <line x1="245" y1="500" x2="155" y2="310"/>
      <line x1="180" y1="310" x2="220" y2="160"/>
      <line x1="220" y1="310" x2="180" y2="160"/>
      <line x1="120" y1="640" x2="280" y2="640"/>
      <line x1="155" y1="430" x2="245" y2="430"/>
      <line x1="180" y1="240" x2="220" y2="240"/>
    </g>

    <!-- Crucetas (3 niveles) -->
    <!-- Cruceta superior (más alta, 3 fases) -->
    <rect x="20" y="170" width="380" height="14" fill="url(#towerSteel)" stroke="#1c2540" stroke-width=".8"/>
    <rect x="20" y="184" width="380" height="6"  fill="#1c2540" opacity=".6"/>
    <!-- Cruceta media -->
    <rect x="40" y="320" width="340" height="14" fill="url(#towerSteel)" stroke="#1c2540" stroke-width=".8"/>
    <rect x="40" y="334" width="340" height="6"  fill="#1c2540" opacity=".6"/>
    <!-- Cruceta baja -->
    <rect x="55" y="475" width="310" height="14" fill="url(#towerSteel)" stroke="#1c2540" stroke-width=".8"/>
    <rect x="55" y="489" width="310" height="6"  fill="#1c2540" opacity=".6"/>

    <!-- Aisladores cerámicos colgando de cada cruceta (3 fases en cada cruceta superior) -->
    <g fill="url(#bushing)" stroke="#5a6e8e" stroke-width=".6">
      <!-- Cruceta superior · 3 cadenas -->
      <g transform="translate(60 184)">
        <rect x="-3" y="0"  width="6"  height="6"/>
        <rect x="-4" y="6"  width="8"  height="4"/>
        <rect x="-3" y="10" width="6"  height="4"/>
        <rect x="-4" y="14" width="8"  height="4"/>
        <rect x="-3" y="18" width="6"  height="4"/>
        <rect x="-4" y="22" width="8"  height="4"/>
        <circle cx="0" cy="30" r="3" fill="#1f2c46"/>
      </g>
      <g transform="translate(210 184)">
        <rect x="-3" y="0"  width="6" height="6"/>
        <rect x="-4" y="6"  width="8" height="4"/>
        <rect x="-3" y="10" width="6" height="4"/>
        <rect x="-4" y="14" width="8" height="4"/>
        <rect x="-3" y="18" width="6" height="4"/>
        <rect x="-4" y="22" width="8" height="4"/>
        <circle cx="0" cy="30" r="3" fill="#1f2c46"/>
      </g>
      <g transform="translate(360 184)">
        <rect x="-3" y="0"  width="6" height="6"/>
        <rect x="-4" y="6"  width="8" height="4"/>
        <rect x="-3" y="10" width="6" height="4"/>
        <rect x="-4" y="14" width="8" height="4"/>
        <rect x="-3" y="18" width="6" height="4"/>
        <rect x="-4" y="22" width="8" height="4"/>
        <circle cx="0" cy="30" r="3" fill="#1f2c46"/>
      </g>
      <!-- Cruceta media · 2 fases -->
      <g transform="translate(80 334)">
        <rect x="-3" y="0"  width="6" height="6"/>
        <rect x="-4" y="6"  width="8" height="4"/>
        <rect x="-3" y="10" width="6" height="4"/>
        <rect x="-4" y="14" width="8" height="4"/>
        <circle cx="0" cy="22" r="3" fill="#1f2c46"/>
      </g>
      <g transform="translate(340 334)">
        <rect x="-3" y="0"  width="6" height="6"/>
        <rect x="-4" y="6"  width="8" height="4"/>
        <rect x="-3" y="10" width="6" height="4"/>
        <rect x="-4" y="14" width="8" height="4"/>
        <circle cx="0" cy="22" r="3" fill="#1f2c46"/>
      </g>
    </g>

    <!-- Punta superior (pararrayos) -->
    <line x1="200" y1="160" x2="200" y2="120" stroke="#4a6590" stroke-width="3"/>
    <circle cx="200" cy="118" r="3.5" fill="#9aaecb"/>
  </g>

  <!-- ════════════ CABLES DE TRANSMISIÓN (catenaria) ═══════════════ -->
  <!-- Las 3 fases salen de la cruceta superior y van al transformador -->
  <g fill="none" stroke-linecap="round">
    <!-- Glow ambiental sobre los cables -->
    <g filter="url(#cableBlur)" opacity=".65">
      <path d="M 420 214 Q 900 360, 1290 540" stroke="url(#cableGlow)" stroke-width="6"/>
      <path d="M 570 214 Q 920 380, 1330 560" stroke="url(#cableGlow)" stroke-width="6"/>
      <path d="M 720 214 Q 940 400, 1370 580" stroke="url(#cableGlow)" stroke-width="6"/>
    </g>
    <!-- Línea base oscura (cable real) -->
    <path d="M 420 214 Q 900 360, 1290 540" stroke="#1c2540" stroke-width="2.4"/>
    <path d="M 570 214 Q 920 380, 1330 560" stroke="#1c2540" stroke-width="2.4"/>
    <path d="M 720 214 Q 940 400, 1370 580" stroke="#1c2540" stroke-width="2.4"/>
    <!-- Highlight superior del cable -->
    <path d="M 420 214 Q 900 360, 1290 540" stroke="rgba(255,255,255,.45)" stroke-width=".9"/>
    <path d="M 570 214 Q 920 380, 1330 560" stroke="rgba(255,255,255,.45)" stroke-width=".9"/>
    <path d="M 720 214 Q 940 400, 1370 580" stroke="rgba(255,255,255,.45)" stroke-width=".9"/>
  </g>

  <!-- ════════════ TRANSFORMADOR DE POTENCIA (lado derecho) ════════ -->
  <g filter="url(#softShadow)" transform="translate(1140 0)">
    <!-- Plinto / pedestal de hormigón -->
    <rect x="40" y="740" width="500" height="50" fill="#5a6378" stroke="#2e3540" stroke-width="1"/>
    <rect x="40" y="740" width="500" height="6"  fill="#7a8298"/>

    <!-- Tanque principal (cilíndrico vertical) -->
    <rect x="80" y="520" width="420" height="220" rx="14" fill="url(#trafoBody)" stroke="#1a2438" stroke-width="1.6"/>
    <!-- Aletas radiadoras laterales -->
    <g fill="#0f1827" stroke="#2a3a52" stroke-width=".8">
      <rect x="50"  y="540" width="32" height="180" rx="3"/>
      <rect x="48"  y="540" width="4"  height="180"/>
      <rect x="55"  y="540" width="4"  height="180"/>
      <rect x="62"  y="540" width="4"  height="180"/>
      <rect x="69"  y="540" width="4"  height="180"/>
      <rect x="76"  y="540" width="4"  height="180"/>
      <rect x="498" y="540" width="32" height="180" rx="3"/>
      <rect x="500" y="540" width="4"  height="180"/>
      <rect x="507" y="540" width="4"  height="180"/>
      <rect x="514" y="540" width="4"  height="180"/>
      <rect x="521" y="540" width="4"  height="180"/>
      <rect x="528" y="540" width="4"  height="180"/>
    </g>

    <!-- Tapa superior con campana -->
    <rect x="100" y="500" width="380" height="22" rx="6" fill="url(#trafoTop)" stroke="#1a2438" stroke-width="1.2"/>
    <rect x="120" y="492" width="340" height="10" rx="4" fill="#384866"/>

    <!-- Bushings AT (3 grandes para fase trifásica) -->
    <g>
      <!-- Bushing 1 -->
      <g transform="translate(160 0)">
        <rect x="-12" y="380" width="24" height="120" rx="3" fill="url(#bushing)" stroke="#5a6e8e" stroke-width=".6"/>
        <rect x="-14" y="395" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="415" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="435" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="455" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="475" width="28" height="6" fill="#9aaecb"/>
        <circle cx="0" cy="378" r="6" fill="#384866" stroke="#1c2540" stroke-width="1"/>
        <line x1="0" y1="378" x2="0" y2="360" stroke="#9aaecb" stroke-width="2.4"/>
        <circle cx="0" cy="358" r="3" fill="#d9e3f2"/>
      </g>
      <!-- Bushing 2 (centro) -->
      <g transform="translate(290 0)">
        <rect x="-13" y="370" width="26" height="130" rx="3" fill="url(#bushing)" stroke="#5a6e8e" stroke-width=".6"/>
        <rect x="-15" y="385" width="30" height="6" fill="#9aaecb"/>
        <rect x="-15" y="405" width="30" height="6" fill="#9aaecb"/>
        <rect x="-15" y="425" width="30" height="6" fill="#9aaecb"/>
        <rect x="-15" y="445" width="30" height="6" fill="#9aaecb"/>
        <rect x="-15" y="465" width="30" height="6" fill="#9aaecb"/>
        <rect x="-15" y="485" width="30" height="6" fill="#9aaecb"/>
        <circle cx="0" cy="368" r="6.5" fill="#384866" stroke="#1c2540" stroke-width="1"/>
        <line x1="0" y1="368" x2="0" y2="345" stroke="#9aaecb" stroke-width="2.4"/>
        <circle cx="0" cy="343" r="3" fill="#d9e3f2"/>
      </g>
      <!-- Bushing 3 -->
      <g transform="translate(420 0)">
        <rect x="-12" y="380" width="24" height="120" rx="3" fill="url(#bushing)" stroke="#5a6e8e" stroke-width=".6"/>
        <rect x="-14" y="395" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="415" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="435" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="455" width="28" height="6" fill="#9aaecb"/>
        <rect x="-14" y="475" width="28" height="6" fill="#9aaecb"/>
        <circle cx="0" cy="378" r="6" fill="#384866" stroke="#1c2540" stroke-width="1"/>
        <line x1="0" y1="378" x2="0" y2="360" stroke="#9aaecb" stroke-width="2.4"/>
        <circle cx="0" cy="358" r="3" fill="#d9e3f2"/>
      </g>
    </g>

    <!-- Conservador (depósito de aceite encima) -->
    <ellipse cx="290" cy="488" rx="80" ry="14" fill="#384866" stroke="#1c2540" stroke-width="1"/>

    <!-- Placa identificadora -->
    <rect x="200" y="640" width="180" height="40" rx="4" fill="rgba(255,255,255,.08)" stroke="#5a6e8e" stroke-width=".8"/>
    <line x1="220" y1="652" x2="360" y2="652" stroke="#9aaecb" stroke-width=".8" opacity=".6"/>
    <line x1="220" y1="660" x2="340" y2="660" stroke="#9aaecb" stroke-width=".8" opacity=".4"/>
    <line x1="220" y1="668" x2="350" y2="668" stroke="#9aaecb" stroke-width=".8" opacity=".4"/>

    <!-- Válvulas / detalles bajos -->
    <circle cx="120" cy="700" r="6"  fill="#1c2540" stroke="#5a6e8e" stroke-width="1"/>
    <circle cx="460" cy="700" r="6"  fill="#1c2540" stroke="#5a6e8e" stroke-width="1"/>
    <rect x="240" y="700" width="100" height="14" fill="#1c2540" stroke="#5a6e8e" stroke-width=".6"/>

    <!-- Highlight superior (specular sobre el tanque) -->
    <rect x="100" y="525" width="380" height="50" rx="14" fill="rgba(255,255,255,.12)" pointer-events="none"/>
  </g>
</svg>
